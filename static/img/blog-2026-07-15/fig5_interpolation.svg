<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 340" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <clipPath id="mainClip"><rect x="70" y="50" width="610" height="220"/></clipPath>
  </defs>

  <text x="370" y="26" text-anchor="middle" font-size="18" font-weight="700" fill="#1E293B">Figure 5: Interpolation and Gap Filling with Kalman Smoothing</text>

  <!-- Plot area -->
  <rect x="68" y="48" width="614" height="224" rx="6" fill="#FAFAFA" stroke="#E5E7EB" stroke-width="1"/>

  <!-- Axes -->
  <line x1="70" y1="270" x2="680" y2="270" stroke="#9CA3AF" stroke-width="1"/>
  <line x1="70" y1="50" x2="70" y2="270" stroke="#9CA3AF" stroke-width="1"/>
  <text x="375" y="292" text-anchor="middle" font-size="12" fill="#6B7280">Time</text>

  <!-- Gap region shading -->
  <rect x="290" y="50" width="180" height="220" fill="#FEF3C7" opacity="0.5"/>
  <text x="380" y="72" text-anchor="middle" font-size="12" font-weight="600" fill="#B45309">Missing Data Gap</text>

  <!-- Confidence band (wider in the gap) -->
  <polygon clip-path="url(#mainClip)" fill="#7C3AED" opacity="0.1" points="
    80,148 100,145 120,142 140,140 160,138 180,136 200,135 220,134 240,133 260,132 280,130
    300,124 320,115 340,108 360,104 380,102 400,108 420,115 440,124
    460,130 480,132 500,133 520,134 540,135 560,136 580,138 600,140 620,142 640,145 660,148 670,150
    670,185 660,182 640,180 620,178 600,176 580,174 560,173 540,172 520,171 500,170 480,168
    460,166 440,171 420,180 400,187 380,192 360,196 340,187 320,180 300,171
    280,166 260,165 240,164 220,163 200,162 180,162 160,163 140,164 120,166 100,170 80,175
  "/>

  <!-- Smoothed estimate (continuous through gap) -->
  <polyline clip-path="url(#mainClip)" fill="none" stroke="#7C3AED" stroke-width="2.5" points="
    80,162 100,158 120,155 140,153 160,152 180,150 200,149 220,148 240,148 260,148 280,148
    300,148 320,148 340,148 360,148 380,147 400,148 420,148 440,148
    460,148 480,150 500,152 520,153 540,154 560,155 580,157 600,160 620,162 640,164 660,166 670,168
  "/>

  <!-- Observed data points (before gap) -->
  <g clip-path="url(#mainClip)">
    <circle cx="85" cy="168" r="4" fill="#2563EB"/>
    <circle cx="105" cy="152" r="4" fill="#2563EB"/>
    <circle cx="125" cy="160" r="4" fill="#2563EB"/>
    <circle cx="145" cy="148" r="4" fill="#2563EB"/>
    <circle cx="165" cy="156" r="4" fill="#2563EB"/>
    <circle cx="185" cy="142" r="4" fill="#2563EB"/>
    <circle cx="205" cy="154" r="4" fill="#2563EB"/>
    <circle cx="225" cy="140" r="4" fill="#2563EB"/>
    <circle cx="245" cy="152" r="4" fill="#2563EB"/>
    <circle cx="265" cy="143" r="4" fill="#2563EB"/>
    <circle cx="285" cy="150" r="4" fill="#2563EB"/>

    <!-- Observed data points (after gap) -->
    <circle cx="475" cy="155" r="4" fill="#2563EB"/>
    <circle cx="495" cy="148" r="4" fill="#2563EB"/>
    <circle cx="515" cy="158" r="4" fill="#2563EB"/>
    <circle cx="535" cy="150" r="4" fill="#2563EB"/>
    <circle cx="555" cy="162" r="4" fill="#2563EB"/>
    <circle cx="575" cy="152" r="4" fill="#2563EB"/>
    <circle cx="595" cy="166" r="4" fill="#2563EB"/>
    <circle cx="615" cy="158" r="4" fill="#2563EB"/>
    <circle cx="635" cy="170" r="4" fill="#2563EB"/>
    <circle cx="655" cy="162" r="4" fill="#2563EB"/>
  </g>

  <!-- Legend -->
  <circle cx="120" cy="310" r="4" fill="#2563EB"/>
  <text x="130" y="314" font-size="11.5" fill="#374151">Observed measurements</text>

  <line x1="265" y1="310" x2="295" y2="310" stroke="#7C3AED" stroke-width="2.5"/>
  <text x="302" y="314" font-size="11.5" fill="#374151">Smoothed estimate</text>

  <rect x="445" y="304" width="30" height="12" rx="2" fill="#7C3AED" opacity="0.15" stroke="#7C3AED" stroke-width="0.5"/>
  <text x="482" y="314" font-size="11.5" fill="#374151">Uncertainty (widens in the gap)</text>
</svg>
