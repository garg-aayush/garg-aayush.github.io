name: India Weather Daily Aggregates

# Once-daily build of per-city daily-aggregate files (last 30 complete IST
# days of temperature, humidity, US AQI). Each run rewrites the files from
# scratch from Open-Meteo, so missed runs self-heal and no separate bootstrap
# is needed. Force-pushes to the orphan `data` branch alongside weather.json
# and history-*.json (which are owned by india-weather-data.yml).

on:
  schedule:
    # 20:30 UTC = 02:00 IST. Two-hour buffer after IST midnight gives
    # Open-Meteo time to publish the just-completed IST day's hourly data.
    - cron: "30 20 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: india-weather-data-publish
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout master sources
        uses: actions/checkout@v4
        with:
          ref: master
          path: src

      - name: Checkout existing data branch
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          ref: data
          path: data-existing

      - name: Build per-city daily aggregates
        working-directory: src
        run: node scripts/fetch-india-weather-daily.mjs ./daily

      - name: Stage publishable payload
        run: |
          set -euo pipefail
          mkdir -p stage
          # Owned by this workflow.
          cp src/daily/daily-*.json stage/
          # Carry forward what the 15-min cron owns so we don't blow it away.
          if [ -d data-existing ]; then
            cp data-existing/weather.json stage/ 2>/dev/null || true
            cp data-existing/history-*.json stage/ 2>/dev/null || true
          fi
          ls -la stage/

      - name: Force-push to data branch
        working-directory: src
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git checkout --orphan data-tmp
          git rm -rf --cached . >/dev/null 2>&1 || true
          cp ../stage/* .
          git add -f daily-*.json
          if compgen -G "history-*.json" > /dev/null; then
            git add -f history-*.json
          fi
          if [ -f weather.json ]; then
            git add -f weather.json
          fi
          git -c commit.gpgsign=false commit -m "chore(data): daily aggregates $(date -u +%FT%TZ)"
          git push --force origin HEAD:data
