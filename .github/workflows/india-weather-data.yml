name: India Weather Data (fallback)

# The 15-min live cron is now owned by the Cloudflare Worker in worker/,
# which fires on schedule (within seconds) instead of suffering Actions'
# 30-80 min cron drift. This workflow is kept as a manual fallback only —
# `workflow_dispatch` lets us force-refresh the data branch from the Actions
# UI if the Worker is ever benched (token rotation, account issue, etc.).
on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  # Shared with india-weather-daily.yml so the 15-min and daily crons cannot
  # race-clobber each other when force-pushing the orphan `data` branch.
  group: india-weather-data-publish
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout master sources
        uses: actions/checkout@v4
        with:
          ref: master
          path: src

      - name: Checkout existing data branch
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          ref: data
          path: data-existing

      - name: Stage prior history (if any) for the fetcher to read
        run: |
          set -euo pipefail
          mkdir -p history-in
          if [ -d data-existing ]; then
            cp data-existing/history-*.json history-in/ 2>/dev/null || true
          fi
          echo "Prior history files: $(ls history-in/ 2>/dev/null | wc -l)"

      - name: Fetch weather, AQI, and update history
        env:
          WAQI_TOKEN: ${{ secrets.WAQI_TOKEN }}
        working-directory: src
        run: |
          node scripts/fetch-india-weather.mjs ./weather.json \
            --history-in ../history-in \
            --history-out ./history-out

      - name: Publish weather.json + history to data branch
        working-directory: src
        run: |
          set -euo pipefail
          if [ ! -s weather.json ]; then
            echo "::error::weather.json is missing or empty"
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Use a worktree-free orphan branch so the data branch always
          # contains exactly one commit. Carry forward daily-*.json from the
          # prior data branch state so we don't blow away the daily cron's
          # outputs (owned by india-weather-daily.yml).
          git checkout --orphan data-tmp
          git rm -rf --cached . >/dev/null 2>&1 || true
          git add -f weather.json
          if compgen -G "history-out/history-*.json" > /dev/null; then
            cp history-out/history-*.json .
            git add -f history-*.json
          fi
          if compgen -G "../data-existing/daily-*.json" > /dev/null; then
            cp ../data-existing/daily-*.json .
            git add -f daily-*.json
          fi
          git -c commit.gpgsign=false commit -m "chore(data): update weather.json $(date -u +%FT%TZ)"
          git push --force origin HEAD:data
